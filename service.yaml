  sdks:
    ts: true
    dart: true
    rust: true
  deprecation_policy: required before public or partner API exposure
  compatibility_policy: no breaking contract change without review note and changelog entry

events:
  cloudevents_required: false
  produced: []
  consumed: []
  replay_supported: false
  dead_letter_policy: null

release:
  environments:
    - local
  rollback_required: true
  migration_policy: contract changes must preserve previous generated input until replacement is reviewed
  change_approval: manual approval required for breaking contract changes
  freeze_windows: []
  canary_policy: null
  feature_flag_required: false

reliability:
  rpo: contract evidence recoverable from git history
  rto: 4h for contract reconstruction
  slo_availability: contract repository available during planned work
  slo_latency_p95_ms: 1000
  night_page: false
  backup_required: true
  restore_drill_required: false
  status_page_required: false
  queue_replay_policy: null

policy_gates:
  required_linter_rules:
    - ZDP-REPO-BASELINE-001
    - ZDP-REPO-MARKDOWN-002
    - ZDP-API-CONTRACTS-001

human_review_required:
  - breaking contract changes
  - public api promotion
  - sdk generation input changes

exit:
  success_criteria:
    - route, error, webhook, and SDK generation contract skeletons are reviewable
    - route, error, webhook, and SDK generation input contract skeletons are machine-validated
    - SDK generation input keeps language targets, route metadata, error metadata, webhook metadata, forbidden ownership, and forbidden values explicit before generator work starts
    - OpenAPI, SDK, docs, and webhook schema export plan is reproducible without writing generated artifacts
    - contract repository validates without implementing backend handlers
  kill_criteria:
    - product handler shapes become the contract source
    - generated SDK output becomes the contract source
  sunset_plan: null
  owner: 0disoft
  review_at: null
  user_notice_days: null
  data_export_window_days: null
  dependency_removal_checklist: []

notes:
  - This MVP owns contract skeletons only; it does not expose a live API.
  - The local checker reads committed contract YAML only; it does not generate SDKs or run backend handlers.
  - SDK generation input is a handoff contract for downstream SDK repositories, not generated SDK source.
  - Export plan is dry-run only and prevents permission, audit, idempotency, request_id, trace_id, and webhook metadata from splitting across generated surfaces.
