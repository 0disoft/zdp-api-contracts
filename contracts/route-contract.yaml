route_contract:
  status: skeleton
  required_per_route:
    - resource
    - action
    - method
    - path
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - owner_boundary
    - tenant_boundary
    - request_id_required
    - trace_id_required
    - session_effect
    - credential_policy
    - success_statuses
    - error_codes
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
  allowed_success_statuses:
    - 200
    - 201
    - 202
    - 204
  no_content_success_statuses:
    - 204
  forbidden_shapes:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
    - provider_specific_id_as_primary_id
    - raw_storage_url
  allowed_session_effects:
    - none
    - issue
    - refresh
    - revoke
    - expire
    - compromise
