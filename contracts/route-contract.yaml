route_contract:
  status: skeleton
  required_per_route:
    - resource
    - action
    - method
    - path
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - success_statuses
    - error_codes
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
  allowed_success_statuses:
    - 200
    - 201
    - 202
    - 204
  forbidden_shapes:
    - screen_component_payload
    - provider_specific_id_as_primary_id
    - raw_storage_url
