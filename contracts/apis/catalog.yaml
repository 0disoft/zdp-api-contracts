    owner_boundary: identity
    tenant_boundary: pending_identity_or_organization
    request_id_required: true
    trace_id_required: true
    session_effect: none
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - authorization_pending
      - access_denied
      - challenge_invalid
      - challenge_expired
      - challenge_already_consumed
      - proof_verifier_mismatch
      - correlation_mismatch
      - slow_down
      - rate_limited
      - idempotency_conflict
  - operation_id: core.auth.recovery_requests.create
    service_id: core-api
