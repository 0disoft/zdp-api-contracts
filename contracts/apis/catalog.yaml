    request_id_required: true
    trace_id_required: true
    session_effect: none
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - validation_failed
      - product_not_allowed
      - scope_not_allowed
      - rate_limited
      - idempotency_conflict
  - operation_id: core.auth.product_link_challenges.complete
    service_id: core-api
    resource: product_link_challenge
    action: complete
    method: POST
    path: /v1/auth/product-link-challenges/{challenge_ref}/complete
    success_statuses:
      - 200
    request_schema_ref: contracts/apis/core-api/product-link.yaml#ProductLinkChallengeCompleteRequest
    response_schema_ref: contracts/apis/core-api/product-link.yaml#ProductLinkChallengeCompleteResponse
    auth_required: true
    permission_check: core.identity.product_link.approve_self
    audit_event: core.identity.product_link.challenge_completed
    idempotency: required_idempotency_key
    owner_boundary: identity
    tenant_boundary: organization
    request_id_required: true
    trace_id_required: true
    session_effect: none
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - authentication_failed
      - challenge_invalid
      - challenge_expired
      - challenge_already_consumed
      - account_restricted
      - consent_required
      - workspace_access_denied
      - idempotency_conflict
  - operation_id: core.auth.product_link_challenges.exchange
    service_id: core-api
