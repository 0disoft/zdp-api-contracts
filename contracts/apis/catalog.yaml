    error_codes:
      - validation_failed
      - rate_limited
      - idempotency_conflict
  - operation_id: core.auth.passkey_challenges.create
    service_id: core-api
    resource: passkey_challenge
    action: create
    method: POST
    path: /v1/auth/passkey/challenges
    success_statuses:
