api_catalog:
  status: route-catalog-contract-only
  route_definition_required_fields:
    - operation_id
    - service_id
    - resource
    - action
    - method
    - path
    - success_statuses
    - request_schema_ref
    - response_schema_ref
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - owner_boundary
    - tenant_boundary
    - request_id_required
    - trace_id_required
    - session_effect
    - credential_policy
    - error_codes
  forbidden_values:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload

routes:
  - operation_id: core.auth.registrations.create
    service_id: core-api
    resource: auth_registration
    action: create
    method: POST
    path: /v1/auth/registrations
    success_statuses:
      - 202
    request_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthRegistrationCreateRequest
    response_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthRegistrationCreateResponse
    auth_required: false
    permission_check: core.identity.public_auth_entrypoint
    audit_event: core.identity.registration.requested
    idempotency: required_idempotency_key
    owner_boundary: identity
    tenant_boundary: pending_identity_or_organization
    request_id_required: true
    trace_id_required: true
    session_effect: none
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - validation_failed
      - identity_conflict
      - rate_limited
      - idempotency_conflict
  - operation_id: core.auth.sessions.create
    service_id: core-api
    resource: auth_session
    action: create
    method: POST
    path: /v1/auth/sessions
    success_statuses:
      - 201
    request_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionCreateRequest
    response_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionCreateResponse
    auth_required: false
    permission_check: core.identity.public_auth_entrypoint
    audit_event: core.identity.session.issue_requested
    idempotency: required_idempotency_key
    owner_boundary: identity
    tenant_boundary: organization
    request_id_required: true
    trace_id_required: true
    session_effect: issue
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - validation_failed
      - authentication_failed
      - rate_limited
      - session_policy_failed
      - account_restricted
      - idempotency_conflict
  - operation_id: core.auth.sessions.refresh
    service_id: core-api
    resource: auth_session
    action: refresh
    method: POST
    path: /v1/auth/sessions/refresh
    success_statuses:
      - 200
    request_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionRefreshRequest
    response_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionRefreshResponse
    auth_required: true
    permission_check: core.identity.session.refresh
    audit_event: core.identity.session.refresh_requested
    idempotency: required_idempotency_key
    owner_boundary: identity
    tenant_boundary: organization
    request_id_required: true
    trace_id_required: true
    session_effect: refresh
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - validation_failed
      - authentication_failed
      - session_revoked
      - session_expired
      - session_compromised
      - account_restricted
      - rate_limited
      - idempotency_conflict
  - operation_id: core.auth.sessions.revoke_current
    service_id: core-api
    resource: auth_session
    action: revoke_current
    method: DELETE
    path: /v1/auth/sessions/current
    success_statuses:
      - 204
    request_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionRevokeCurrentRequest
    response_schema_ref: contracts/apis/core-api/auth-session.yaml#AuthSessionRevokeCurrentResponse
    auth_required: true
    permission_check: core.identity.session.revoke_self
    audit_event: core.identity.session.revoked
    idempotency: required_idempotency_key
    owner_boundary: identity
    tenant_boundary: organization
    request_id_required: true
    trace_id_required: true
    session_effect: revoke
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - authentication_failed
      - session_revoked
      - session_expired
      - session_compromised
      - idempotency_conflict
  - operation_id: core.auth.sessions.get_current
    service_id: core-api
    resource: auth_session
    action: get_current
    method: GET
    path: /v1/auth/sessions/current
    success_statuses:
      - 200
    request_schema_ref: contracts/apis/core-api/auth-session-consumer.yaml#AuthSessionCurrentGetRequest
    response_schema_ref: contracts/apis/core-api/auth-session-consumer.yaml#AuthSessionCurrentGetResponse
    auth_required: true
    permission_check: core.identity.session.read_self
    audit_event: core.identity.session.read
    idempotency: not_required
    owner_boundary: identity
    tenant_boundary: organization
    request_id_required: true
    trace_id_required: true
    session_effect: none
    credential_policy: no_refresh_token_plaintext_no_provider_secret_no_authorization_or_cookie_header_payload
    error_codes:
      - authentication_failed
      - session_revoked
      - session_expired
      - session_compromised
      - account_restricted
  - operation_id: core.auth.product_link_challenges.create
