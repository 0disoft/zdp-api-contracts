error_envelope:
  schema_version: 1
  required_fields:
    - code
    - message
    - request_id
    - trace_id
  optional_fields:
    - details
    - retry_after_seconds
    - documentation_url
  forbidden_fields:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
