sdk_generation_input:
  status: skeleton
  source_contracts:
    - contracts/route-contract.yaml
    - contracts/error-envelope.yaml
    - contracts/webhook-contract.yaml
    - contracts/sdk-generation-input.yaml
    - contracts/apis/catalog.yaml
    - contracts/apis/core-api/auth-session.yaml
  generation_targets:
    - typescript
    - dart
    - rust
  allowed_generation_targets:
    - typescript
    - dart
    - rust
    - swift
    - kotlin
    - go
  required_route_metadata:
    - operation_id
    - resource
    - action
    - method
    - path
    - request_schema_ref
    - response_schema_ref
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - owner_boundary
    - tenant_boundary
    - request_id_required
    - trace_id_required
    - session_effect
    - credential_policy
    - success_statuses
    - error_codes
  required_error_metadata:
    - code
    - message
    - request_id
    - trace_id
    - retry_after_seconds
    - documentation_url
  required_webhook_metadata:
    - event_id
    - event_type
    - schema_version
    - signature_verification
    - idempotency_key
    - replay_policy
    - dead_letter_policy
  forbidden_ownership:
    - generated_sdk_source
    - sdk_runtime_implementation
    - product_business_logic
    - refresh_token_storage
    - final_authorization_decision
    - provider_credential_storage
  forbidden_values:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
